<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesión | Biblioteca Alfonso Reyes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- HEADER (igual que index) -->
<header class="header d-flex justify-content-between align-items-center">
    <div class="logo">Biblioteca “Alfonso Reyes”</div>
    <a href="index.html">Inicio</a>
</header>

<!-- CONTENIDO LOGIN -->
<main class="login-container">

    <div class="login-card">

        <h2>Iniciar Sesión</h2>

        <form id="loginForm">

            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="email" class="form-control" id="usuario" required>
            </div>

            <div class="mb-4">
                <label>Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <button type="submit" class="btn btn-principal w-100">
                Entrar
            </button>

        </form>

        <p class="mt-3 text-center">
            ¿No tienes cuenta?
            <a href="register.html">Regístrate</a>
        </p>

    </div>

</main>

<script src="js/auth.js"></script>

</body>
</html>
