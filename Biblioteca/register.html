<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro | Biblioteca Alfonso Reyes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- HEADER -->
<header class="header d-flex justify-content-between align-items-center">
    <div class="logo">Biblioteca “Alfonso Reyes”</div>
    <a href="index.html">Inicio</a>
</header>

<!-- CONTENIDO -->
<main class="login-container">

    <div class="login-card register-card">

        <h2>Crear Cuenta</h2>

        <form id="registerForm">

            <div class="mb-3">
                <label>Nombre completo</label>
                <input type="text" class="form-control" id="nombre" required>
            </div>

            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="email" class="form-control" id="correo" required>
            </div>

            <div class="mb-3">
                <label>Teléfono</label>
                <input type="tel" class="form-control" id="telefono" required>
            </div>

            <div class="mb-3">
                <label>Usuario</label>
                <input type="text" class="form-control" id="nuevoUsuario" required>
            </div>

            <div class="mb-4">
                <label>Contraseña</label>
                <input type="password" class="form-control" id="nuevaPassword" required>
            </div>

            <button type="submit" class="btn btn-principal w-100">
                Registrarme
            </button>

        </form>

        <p class="mt-3 text-center">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
        </p>

    </div>

</main>

<script src="js/register.js"></script>

</body>
</html>
