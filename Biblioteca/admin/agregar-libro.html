<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Libro | Biblioteca Alfonso Reyes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .sidebar-section { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-toggle {
            display: flex; justify-content: space-between; align-items: center;
            color: white; padding: 15px 25px; font-size: 16px; cursor: pointer;
            transition: background 0.2s; user-select: none;
        }
        .sidebar-toggle:hover { background: var(--detalle); }
        .sidebar-toggle .arrow { font-size: 12px; transition: transform 0.3s; }
        .sidebar-toggle.open .arrow { transform: rotate(180deg); }
        .sidebar-submenu { display: none; background: rgba(0,0,0,0.2); }
        .sidebar-submenu.open { display: block; }
        .sidebar-submenu a { padding: 10px 25px 10px 40px; font-size: 14px; color: rgba(255,255,255,0.85); }
        .sidebar-submenu a:hover { background: var(--detalle); }

        .form-libro {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(6px);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }
        .form-libro label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--texto);
        }
        .form-libro input, .form-libro select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            transition: border 0.2s;
        }
        .form-libro input:focus, .form-libro select:focus { border-color: var(--detalle); }
        .btn-guardar {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: var(--vino);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-guardar:hover { background: var(--detalle); }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">
    <div class="sidebar-section">
        <div class="sidebar-toggle open" onclick="toggleSubmenu('libros-menu', this)">
            + Libros <span class="arrow" style="transform:rotate(180deg)">▼</span>
        </div>
        <div class="sidebar-submenu open" id="libros-menu">
            <a href="consultar-libros.html">- Consultar Títulos</a>
            <a href="agregar-libro.html">- Ingresar Título</a>
        </div>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-toggle" onclick="toggleSubmenu('prestamos-menu', this)">
            + Préstamos <span class="arrow">▼</span>
        </div>
        <div class="sidebar-submenu" id="prestamos-menu">
            <a href="autorizar-prestamo.html">- Autorizar Préstamo</a>
            <a href="consultar-prestamos.html">- Consultar Préstamo</a>
        </div>
    </div>
    <div class="sidebar-section">
        <div class="sidebar-toggle" onclick="toggleSubmenu('miembros-menu', this)">
            + Miembros <span class="arrow">▼</span>
        </div>
        <div class="sidebar-submenu" id="miembros-menu">
            <a href="#">- Consultar Préstamos y Multas</a>
        </div>
    </div>
</aside>

<!-- HEADER -->
<header class="header">
    <div class="header-content">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span class="logo">Biblioteca "Alfonso Reyes"</span>
        </div>
        <a href="#" class="perfil-icon">👤 Administrador</a>
    </div>
</header>

<main>
    <h1 class="titulo-seccion">Ingresar Título.</h1>

    <div class="form-libro">
        <label>Título</label>
        <input type="text" id="titulo" placeholder="Título del libro">

        <label>Autor</label>
        <input type="text" id="autor" placeholder="Nombre del autor">

        <label>Género</label>
        <input type="text" id="genero" placeholder="Ej. Novela, Fábula, Distopía...">

        <label>ISBN</label>
        <input type="text" id="isbn" placeholder="Ej. 9783140464079">

        <label>Número de copias</label>
        <input type="number" id="copias" placeholder="Ej. 5" min="1">

        <button class="btn-guardar" onclick="alert('Funcionalidad próximamente')">Guardar libro</button>
    </div>
</main>

<footer>© 2026 Biblioteca "Alfonso Reyes"</footer>

<script>
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }
function toggleSubmenu(id, btn) {
    document.getElementById(id).classList.toggle("open");
    btn.classList.toggle("open");
}
</script>
</body>
</html>
