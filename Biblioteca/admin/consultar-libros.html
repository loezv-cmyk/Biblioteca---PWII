<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Libros | Biblioteca "Alfonso Reyes"</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .btn-ver {
            background: var(--fondo1); color: white; border: none;
            padding: 5px 12px; border-radius: 6px; cursor: pointer;
            font-size: 13px; margin-right: 4px; transition: opacity 0.2s;
        }
        .btn-editar {
            background: var(--detalle); color: white; border: none;
            padding: 5px 12px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: opacity 0.2s;
        }
        .btn-ver:hover, .btn-editar:hover { opacity: 0.8; }
        .btn-agregar {
            display: inline-block; background: var(--vino); color: white;
            padding: 10px 20px; border-radius: 8px; text-decoration: none;
            font-size: 15px; margin-bottom: 20px; transition: background 0.2s;
        }
        .btn-agregar:hover { background: var(--detalle); color: white; }
    </style>
</head>
<body class="has-app-nav">

<script src="../js/session.js"></script>
<script> requireAdmin(); </script>

<div id="app-nav" data-page="admin-libros"></div>

<main>
    <h1 class="titulo-seccion">Gestión de Libros</h1>

    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
        <div class="search-container" style="margin-bottom:0;">
            <input type="text" id="searchInput" placeholder="Buscar por título...">
            <button class="btn-primary">Buscar</button>
        </div>
        <a href="agregar-libro.html" class="btn-agregar">+ Agregar libro</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Género</th>
                    <th>ISBN</th>
                    <th># Copias</th>
                    <th>Editar</th>
                </tr>
            </thead>
            <tbody id="librosTable">
                <tr>
                    <td colspan="6" style="text-align:center; padding:20px; color:#666;">
                        Próximamente — aún no implementado
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer>© 2026 Biblioteca "Alfonso Reyes"</footer>
<script src="../js/nav.js"></script>
</body>
</html>
